
# DSU source server (the IP that publishes controller data)
dsu:
  host: "127.0.0.1"
  port: 26760
  slot: 0

# Runtime behavior
runtime:
  # Enable temporary debug logs to terminal (raw inputs and motion values)
  debug_log: false
  
  # Radial deadzone for both analog sticks (0.0 to 0.4). Good start: 0.1
  deadzone: 0.1

  # Keep D-Pad from being pressed when either stick is intentionally moved.
  # Useful for DSU sources that mirror stick movement into D-Pad bits.
  suppress_dpad_when_sticks_active: true
  dpad_suppress_threshold: 20
  
  # DSU uses Y positive=up, while many virtual gamepads expect Y positive=down.
  invert_left_stick_y: true
  
  # Forward DSU accelerometer and gyroscope data to the virtual DS4
  motion_enabled: true
  # Invert gyro/accel axes if rotation or movement is inverted in games
  invert_gyro_pitch: false
  invert_gyro_yaw: true
  invert_gyro_roll: true
  invert_accel_x: false
  invert_accel_y: false
  invert_accel_z: true

# Touch conversion from DSU range to DS4 touchpad range
touch:
  source_max_x: 320
  source_max_y: 240
  target_max_x: 1919
  target_max_y: 941
  
  # Set to FALSE to pass native multi-touch data directly to the virtual DS4 touchpad
  # Set to TRUE to map the touch screen to the right analog stick (e.g. for camera control)
  right_stick_enabled: true
  invert_right_stick_y: false
  
  # If touch-to-right-stick is off, map touch to system mouse cursor
  mouse_fallback_enabled: false
  assume_touch_click: false
  mouse_monitor_index: 1

